<!DOCTYPE html>
<head>
    <title>1.Calc</title>
    <link rel="stylesheet" href="style.css"
</head>
<body>
    <input id="input" type="text" value="0">
    <div class="panel" id="panel01">
        <button class="func" data-action="C">C</button><button class="func" data-action="+-">+-</button><button class="func" data-action="^">^</button><button class="func" data-action="del">del</button>
        <br>
        <button class="digit" data-action="7">7</button><button class="digit" data-action="8">8</button><button class="digit" data-action="9">9</button><button class="operator" data-action="-">-</button>
        <br>
        <button class="digit" data-action="4">4</button><button class="digit" data-action="5">5</button><button class="digit" data-action="6">6</button><button class="operator" data-action="/">/</button>
        <br>
        <button class="digit" data-action="1">1</button><button class="digit" data-action="2">2</button><button class="digit" data-action="3">3</button><button class="operator" data-action="*">*</button>
        <br>
        <button class="digit" data-action="0">0</button><button class="digit" data-action=".">.</button><button class="operator" data-action="=">=</button><button class="operator" data-action="+">+</button>
    </div>
    <script src="app.js"></script>
</body>
